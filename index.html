<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Stats</title>
</head>
<body>
<header>
    <section>
        <div>
            <div>
                <p>Character Name>
                <input type="text" name="" id="">
            </div>
        <div>
            <p>Player Name</p>
            <input type="text" name="" id="">
        </div>
         <div>
            <p>EXP</p>
            <input type="text" name="" id="">
        </div>
         <div>
            <p>Race</p>
            <input type="text" name="" id="">
        </div>
         <div>
            <p>Class</p>
            <input type="text" name="" id="">
        </div>
         <div>
            <p>Allignment</p>
            <input type="text" name="" id="">
        </div>
    </section>
</header>
<main class="conteiner-conteudo-princopal">
    <section class="sessao-conteudo-principal">
    <div class="conteiner-modificadores">
 <div class="strength">
            <p>STR</p>
            <input type="text" name="" id="">
        </div>
         <div class="defense">
            <p>DEF</p>
            <input type="text" name="" id="">
        </div>
         <div class="constituition">
            <p>CON</p>
            <input type="text" name="" id="">
        </div>
         <div class="intelligence">
            <p>INT</p>
            <input type="text" name="" id="">
        </div>
         <div class="wisdom">
            <p>WIS</p>
            <input type="text" name="" id="">
        </div>
     <div class="carisma">
            <p>CAR</p>
            <input type="text" name="" id="">
        </div>
    </div>
<div class="conteiner-vdv-img">
    <div class="conteiner-vdv">
        <div>
            <p>Health</p>
            <input type="text" name="" id="">
        </div> 
        <div>
            <p>Defense</p>
            <input type="text" name="" id="">
        </div> 
        <div>
            <p>Speed</p>
            <input type="text" name="" id="">
        </div>
    </div>
<div class="conteiner-img">
    <img src="Dio.jpg" alt="">
</div>
<div class="conteiner-biografia">
    <h2>
        Bio
    </h2>
    <textarea cols="30" rows="25"></textarea>
</div>
</section>
    <section class="sessao-conteudo-secundario">
    <div class="conteiner-equipamento">
        <h2>Equipamentos</h2>
        <textarea cols="30" rows="10"></textarea>
    </div>
    <div class="conteiner-caracteristicas">
        <h2>Caracteristicas</h2>
        <textarea cols="30" rows="10"></textarea>
    </div>
    </section>
</body>
</html>
